name: Godot Autonomous QA

on:
  # Jalankan setiap minggu atau saat ada perubahan signifikan
  schedule:
    - cron: '0 2 * * 1'   # Setiap Senin jam 02:00 UTC
  workflow_dispatch:       # Manual trigger
  push:
    branches: [main, master]
    paths:
      - '**.gd'            # Hanya jika ada perubahan script

env:
  GAME_NAME: "MyGame"           # SESUAIKAN: nama game dari project.godot
  GODOT_VERSION: "4.3"          # SESUAIKAN: versi Godot yang digunakan
  PROJECT_PATH: "."             # SESUAIKAN: path ke folder project.godot

jobs:
  autonomous-qa:
    name: Autonomous QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Import project
        run: |
          godot --path "${{ env.PROJECT_PATH }}" --headless --import --quit || true

      - name: Run screenshot harness
        run: |
          godot --path "${{ env.PROJECT_PATH }}" --headless -- --shot
        timeout-minutes: 5

      - name: Run smoke scenario
        run: |
          SCENARIO_PATH="${{ env.PROJECT_PATH }}/scenarios/smoke.json"
          if [ -f "$SCENARIO_PATH" ]; then
            godot --path "${{ env.PROJECT_PATH }}" --headless -- --scenario "$SCENARIO_PATH"
          else
            echo "WARN: smoke.json tidak ditemukan — skip scenario"
          fi
        timeout-minutes: 10

      - name: Collect QA artifacts
        run: |
          SHOTS_DIR="$HOME/.local/share/godot/app_userdata/${{ env.GAME_NAME }}/shots"
          echo "=== QA Summary ===" >> qa-summary.txt
          echo "Commit: ${{ github.sha }}" >> qa-summary.txt
          echo "Date: $(date -u)" >> qa-summary.txt
          echo "" >> qa-summary.txt
          if [ -d "$SHOTS_DIR" ]; then
            PNG_COUNT=$(find "$SHOTS_DIR" -name "*.png" | wc -l)
            echo "Screenshots: $PNG_COUNT" >> qa-summary.txt
          fi
          if [ -f "$HOME/.local/share/godot/app_userdata/${{ env.GAME_NAME }}/shots/scenario_result.json" ]; then
            python3 -c "
          import json
          d = json.load(open('$HOME/.local/share/godot/app_userdata/${{ env.GAME_NAME }}/shots/scenario_result.json'))
          print('Scenario:', d.get('status','unknown'),
                '| Pass:', d.get('steps_pass', d.get('passed',0)),
                '| Fail:', d.get('steps_fail', d.get('failed',0)))
          " >> qa-summary.txt
          fi
          cat qa-summary.txt

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-qa-${{ github.sha }}
          path: |
            ~/.local/share/godot/app_userdata/${{ env.GAME_NAME }}/shots/*.png
            ~/.local/share/godot/app_userdata/${{ env.GAME_NAME }}/shots/scenario_result.json
            ~/.local/share/godot/app_userdata/${{ env.GAME_NAME }}/shots/shots-manifest.json
            qa-summary.txt
          retention-days: 90
          if-no-files-found: warn
