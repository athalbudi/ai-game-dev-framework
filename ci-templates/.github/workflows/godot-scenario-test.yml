# CATATAN: Template ini belum diuji di environment CI nyata (GitHub Actions).
# Dibuat berdasarkan dokumentasi Godot headless CI standar.
# Sebelum digunakan, verifikasi: path app_userdata, versi Godot, dan nama game.
#
name: Godot Scenario Test CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  GAME_NAME: "MyGame"           # SESUAIKAN: nama game dari project.godot
  GODOT_VERSION: "4.3"          # SESUAIKAN: versi Godot yang digunakan
  PROJECT_PATH: "."             # SESUAIKAN: path ke folder project.godot

jobs:
  scenario-test:
    name: Scenario Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Import project
        run: |
          godot --path "${{ env.PROJECT_PATH }}" --headless --import --quit || true

      - name: Run smoke scenario
        run: |
          SCENARIO_PATH="${{ env.PROJECT_PATH }}/scenarios/smoke.json"
          if [ ! -f "$SCENARIO_PATH" ]; then
            echo "WARN: scenarios/smoke.json tidak ditemukan — skip scenario test"
            exit 0
          fi
          godot --path "${{ env.PROJECT_PATH }}" --headless -- --scenario "$SCENARIO_PATH"
        timeout-minutes: 10

      - name: Check scenario result
        run: |
          RESULT_PATH="$HOME/.local/share/godot/app_userdata/${{ env.GAME_NAME }}/shots/scenario_result.json"
          if [ ! -f "$RESULT_PATH" ]; then
            echo "WARN: scenario_result.json tidak ditemukan — scenario mungkin belum diimplementasikan"
            exit 0
          fi
          STATUS=$(python3 -c "import json; d=json.load(open('$RESULT_PATH')); print(d.get('status','unknown'))")
          PASSED=$(python3 -c "import json; d=json.load(open('$RESULT_PATH')); print(d.get('steps_pass', d.get('passed', 0)))")
          FAILED=$(python3 -c "import json; d=json.load(open('$RESULT_PATH')); print(d.get('steps_fail', d.get('failed', 0)))")
          echo "Status: $STATUS | Pass: $PASSED | Fail: $FAILED"
          if [ "$STATUS" = "fail" ] && [ "$FAILED" -gt 0 ]; then
            echo "ERROR: Scenario gagal — $FAILED step tidak pass"
            exit 1
          fi

      - name: Upload scenario results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-results-${{ github.sha }}
          path: ~/.local/share/godot/app_userdata/${{ env.GAME_NAME }}/shots/scenario_result.json
          retention-days: 30
          if-no-files-found: ignore
